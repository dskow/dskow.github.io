# Welcome to Amplified for Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: Dskow Blog
email: david@dskow.com
description: >
  Notes on backend engineering, distributed systems, and cloud-native development.
logo: "/assets/images/logo.png"
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://dskow.com" # the base hostname & protocol for your site
paginate:	5 # The number of posts to show per page on your homepage

name: 'David Skowronski'
bio: >
  Senior backend engineer building distributed systems, event-driven pipelines,
  and scalable APIs. 26+ years across telecom, defense, IoT, and AI security.
author_image: "/assets/images/author.jpg"
twitter_username: dskowFL
github_username: dskow

# Google Analytics
analytics_id: ""

# Build settings
markdown: kramdown

kramdown:
  parse_block_html: true

plugins:
  - jekyll-paginate
